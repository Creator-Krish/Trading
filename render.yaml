services:
  - type: web
    name: json-stock-intelligence-platform
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_TOKEN
        generateValue: true
      - key: PRICE_REFRESH_BATCH
        value: "50"
      - key: CACHE_DIR
        value: /tmp/stock-platform-cache
